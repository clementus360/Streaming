# Optional Nginx Reverse Proxy - Docker Compose Addon
# 
# Usage (with main services running):
#   docker-compose -f docker-compose.yml -f docker-compose.nginx.yml up -d
#
# This adds a professional reverse proxy layer with HTTPS/SSL support

version: '3.9'

services:
  nginx:
    image: nginx:1.25-alpine
    container_name: nginx_proxy
    restart: unless-stopped
    depends_on:
      - distribution-service
      - ingest-service
    ports:
      - "80:80"   # HTTP (auto-redirect to HTTPS)
      - "443:443" # HTTPS (recommended for production)
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Uncomment these for SSL certificates:
      # - ./certs/fullchain.pem:/etc/nginx/certs/fullchain.pem:ro
      # - ./certs/privkey.pem:/etc/nginx/certs/privkey.pem:ro
      # - ./certs/certbot:/var/www/certbot:ro
      - nginx_logs:/var/log/nginx
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    networks:
      - streaming_network

# Add this volume to store nginx logs
volumes:
  nginx_logs:
    driver: local

networks:
  streaming_network:
    external: true
